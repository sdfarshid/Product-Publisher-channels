version: "3.9"

services:
  db:
    image: postgres
    container_name: user_service_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
      build:
        context: .
        dockerfile: Dockerfile.prod
      container_name: user_service_app
      depends_on:
        - db
      environment:
        DATABASE_URL: postgresql://user:password@db/user_db
      ports:
        - "8000:8000"
      volumes:
        - .:/app
      command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres_data: